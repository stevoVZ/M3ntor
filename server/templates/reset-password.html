<!doctype html>
<html>
  <head>
    <title>Reset Password — APP_NAME_PLACEHOLDER</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #F8F7FF 0%, #EDE9FE 30%, #F0EAFF 60%, #F5F3FF 100%);
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 400px;
        background: rgba(255,255,255,0.72);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-radius: 20px;
        padding: 32px 24px;
        border: 1px solid rgba(255,255,255,0.8);
        box-shadow: 0 8px 32px rgba(79,70,229,0.08);
      }
      .icon-wrap {
        text-align: center;
        margin-bottom: 20px;
      }
      .icon-circle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        border-radius: 32px;
        background: linear-gradient(135deg, #6366F1, #4F46E5);
      }
      .icon-circle svg { width: 28px; height: 28px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      h1 {
        font-size: 22px;
        font-weight: 700;
        color: #1C1C1E;
        text-align: center;
        margin-bottom: 6px;
        letter-spacing: -0.3px;
      }
      .subtitle {
        font-size: 14px;
        color: #8E8E93;
        text-align: center;
        margin-bottom: 24px;
      }
      .form-fields {
        background: rgba(255,255,255,0.6);
        border-radius: 14px;
        overflow: hidden;
        margin-bottom: 20px;
      }
      .input-wrap {
        display: flex;
        align-items: center;
        padding: 0 14px;
      }
      .input-wrap + .input-wrap {
        border-top: 1px solid rgba(0,0,0,0.06);
      }
      .input-wrap svg { width: 18px; height: 18px; fill: none; stroke: #AEAEB2; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; margin-right: 10px; flex-shrink: 0; }
      .input-wrap input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        padding: 15px 0;
        font-size: 16px;
        color: #1C1C1E;
        font-family: inherit;
      }
      .input-wrap input::placeholder { color: #C7C7CC; }
      .submit-btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, #6366F1, #4F46E5);
        color: white;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.3px;
        cursor: pointer;
        font-family: inherit;
        box-shadow: 0 6px 12px rgba(79,70,229,0.3);
        transition: opacity 0.15s;
      }
      .submit-btn:hover { opacity: 0.9; }
      .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .banner {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        border-radius: 12px;
        margin-bottom: 16px;
        font-size: 14px;
        font-weight: 500;
        line-height: 1.4;
      }
      .banner svg { width: 16px; height: 16px; flex-shrink: 0; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .banner.error { display: flex; background: rgba(220,38,38,0.08); color: #DC2626; }
      .banner.error svg { stroke: #DC2626; }
      .banner.success { display: flex; background: rgba(22,163,74,0.08); color: #16A34A; }
      .banner.success svg { stroke: #16A34A; }
      .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #4F46E5;
        text-decoration: none;
        font-weight: 600;
      }
      .back-link:hover { text-decoration: underline; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-wrap">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
      </div>
      <h1>Set New Password</h1>
      <p class="subtitle">Enter your new password below</p>

      <div id="banner" class="banner"></div>

      <div id="form-section">
        <div class="form-fields">
          <div class="input-wrap">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="New Password" autocomplete="new-password" />
          </div>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <input type="password" id="confirm" placeholder="Confirm Password" autocomplete="new-password" />
          </div>
        </div>
        <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">Update Password</button>
      </div>

      <a class="back-link" href="/">Back to app</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      var SUPABASE_URL = 'SUPABASE_URL_PLACEHOLDER';
      var SUPABASE_KEY = 'SUPABASE_KEY_PLACEHOLDER';
      var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      function showBanner(type, message) {
        var banner = document.getElementById('banner');
        var icon = type === 'error'
          ? '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
          : '<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
        banner.className = 'banner ' + type;
        banner.innerHTML = icon + '<span>' + message + '</span>';
      }

      (async function init() {
        var hash = window.location.hash;
        if (!hash || hash.indexOf('access_token') === -1) {
          if (hash.indexOf('error') !== -1) {
            var params = new URLSearchParams(hash.substring(1));
            var desc = params.get('error_description') || 'The link is invalid or has expired.';
            showBanner('error', desc.replace(/\+/g, ' '));
            document.getElementById('form-section').classList.add('hidden');
          }
          return;
        }
        try {
          var params = new URLSearchParams(hash.substring(1));
          var accessToken = params.get('access_token');
          var refreshToken = params.get('refresh_token');
          if (accessToken && refreshToken) {
            var result = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
            if (result.error) {
              showBanner('error', result.error.message);
              document.getElementById('form-section').classList.add('hidden');
            }
          }
        } catch(e) {
          showBanner('error', 'Failed to verify reset link.');
          document.getElementById('form-section').classList.add('hidden');
        }
      })();

      async function handleSubmit() {
        var pw = document.getElementById('password').value;
        var cf = document.getElementById('confirm').value;
        var btn = document.getElementById('submit-btn');

        document.getElementById('banner').className = 'banner';

        if (!pw || !cf) {
          showBanner('error', 'Please fill in both fields.');
          return;
        }
        if (pw.length < 6) {
          showBanner('error', 'Password must be at least 6 characters.');
          return;
        }
        if (pw !== cf) {
          showBanner('error', 'Passwords do not match.');
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';

        try {
          var result = await sb.auth.updateUser({ password: pw });
          if (result.error) throw result.error;
          showBanner('success', 'Password updated successfully! Redirecting...');
          document.getElementById('form-section').classList.add('hidden');
          setTimeout(function() { window.location.href = '/'; }, 2000);
        } catch(e) {
          showBanner('error', e.message || 'Something went wrong.');
          btn.disabled = false;
          btn.textContent = 'Update Password';
        }
      }

      document.getElementById('confirm').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') handleSubmit();
      });
    </script>
  </body>
</html>
